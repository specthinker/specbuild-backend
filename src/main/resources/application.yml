server:
  port: ${PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

spring:
  application:
    name: specbuild-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:sqlite:./data/specthinker.db}
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
      connection-test-query: SELECT 1
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      continue-on-error: false
  jackson:
    default-property-inclusion: non_null

specthinker:
  cors:
    allowed-origins: ${ALLOWED_ORIGIN:*}
  backend-url: ${BACKEND_URL:http://localhost:8080}
  llm:
    connect-timeout: 10
    request-timeout: 45
    quota:
      enabled: true
      per-client-per-day: 50
      default-client-id: anonymous
    providers:
      deepseek:
        enabled: true
        api-key: ${DEEPSEEK_API_KEY:}
        base-url: https://api.deepseek.com/v1
        model: deepseek-chat
      openrouter-deepseek:
        enabled: true
        api-key: ${OPENROUTER_API_KEY:}
        base-url: https://openrouter.ai/api/v1
        model: deepseek/deepseek-chat-v3.1:free
      openrouter-free:
        enabled: true
        api-key: ${OPENROUTER_API_KEY:}
        base-url: https://openrouter.ai/api/v1
        model: meta-llama/llama-3.1-8b-instruct:free
  auth:
    session-secret: ${SESSION_SECRET:}
    session-ttl-days: 365
    allowed-redirect-origins: ${ALLOWED_REDIRECT_ORIGINS:http://localhost:5173,https://specthinker.github.io}
    cookie:
      samesite: ${COOKIE_SAMESITE:Lax}
      secure: ${COOKIE_SECURE:false}
      domain: ${COOKIE_DOMAIN:}
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
      client-secret: ${GOOGLE_CLIENT_SECRET:}
    mail:
      resend-api-key: ${RESEND_API_KEY:}
      from: ${MAIL_FROM:onboarding@resend.dev}
      mode: ${MAIL_MODE:logging}
  stripe:
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
    price-to-plan: ${STRIPE_PRICE_TO_PLAN:}

logging:
  level:
    root: INFO
    com.specthinker: INFO
    org.springframework.jdbc.core: WARN
    org.springframework.data.jdbc: WARN
